services:
  postgres:
    image: postgres:16
    container_name: iat-ai-phm-postgres
    restart: always
    ports:
      - "5444:5432"
    environment:
      POSTGRES_DB: iat_ai_phm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1004
    volumes:
      - iat_ai_phm_data:/var/lib/postgresql/data

volumes:
  iat_ai_phm_data: